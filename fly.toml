# fly.toml app configuration file generated for aegisforge-bot on 2026-05-12T22:20:28Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'aegisforge-bot'
primary_region = 'ams'

[build]

[env]
  PORT = '8080'
  RUST_LOG = 'aegisforge=info,sqlx=warn'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 2
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 500
    soft_limit = 400

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 1024
