# fly.toml app configuration file
# See https://fly.io/docs/reference/configuration/

app = 'aegisforge'
primary_region = 'dfw'

[build]

[env]
  PORT = "8080"
  RUST_LOG = "aegisforge=info,sqlx=warn"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
